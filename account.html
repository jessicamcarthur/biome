<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.iconify.design/3/3.2.1/iconify.min.js"></script>
    <link rel="stylesheet" href="https://use.typekit.net/lhk3lyb.css">
    <link rel="stylesheet" href="style.css">
    <title>Biome</title>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
            <div class="logo">
                <a href="index.html">
                    <img src="images/arrow-left.svg" alt="Back Arrow">
                </a>
            </div>
             <img src="images/background.png" alt="" class="header-bg">
        </div>

        <div class="hero-text">
            <h1>Welcome Back</h1>
            <h2>Jess</h2>
            <div class="date-visited">You visited in March 2026</div>
        </div>
    </header>

    <!-- BODY -->
    <div class="container">

        <!-- Your Collection Section -->
        <section class="account-collection">
            <div class="account-collection-header">
                <div class="save-icon"> <img src="images/save.svg" alt="Save Icon"></div>
                <h3>Your Collection (3)</h3>
                <a href="collection.html" class="view-button">View All</a>
            </div>
            <div class="account-cards">
                <div class="account-card">
                    <a href="kumarahou.html">
                        <img src="images/kumarahou.png" alt="Kūmarahou Soap">
                    </a>
                    <div class="card-text">
                        <h4>Kūmarahou Soap</h4>
                    </div>
                </div>
                <div class="account-card">
                    <a href="manuka.html">
                        <img src="images/manuka.png" alt="Manuka Tea">
                    </a>
                    <div class="card-text">
                        <h4>Manuka Tea</h4>
                    </div>
                </div>
            </div>
        </section>

        <!-- Settings Section -->
        <section class="settings-section">
            <div class="settings-header">
                <div class="save-icon"> <img src="images/settings.svg" alt="Save Icon"></div>
                <h3>Settings</h3>
            </div>
            <div class="settings-card">
                <div class="settings-item">
                    <img src="images/account2.svg" alt="Account Icon">
                    <p>Account</p>
                    <img src="images/arrow-right.svg" alt="Right Arrow">
                </div>

                <div class="settings-item">
                    <img src="images/notification.svg" alt="Notification Icon">
                    <p>Notifications</p>
                    <img src="images/arrow-right.svg" alt="Right Arrow">
                </div>

                <div class="settings-item">
                    <img src="images/privacy.svg" alt="Privacy Icon">
                    <p>Privacy</p>
                    <img src="images/arrow-right.svg" alt="Right Arrow">
                </div>

            </div>
        </section>

        <script src="script.js"></script>
</body>

</html>
