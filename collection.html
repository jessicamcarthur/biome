<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.iconify.design/3/3.2.1/iconify.min.js"></script>
    <link rel="stylesheet" href="https://use.typekit.net/lhk3lyb.css">
    <link rel="stylesheet" href="style.css">
    <title>Biome</title>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
            <div class="logo">
                <a href="index.html">
                    <img src="images/arrow-left.svg" alt="Back Arrow">
                </a>
            </div>
            <img src="images/background.png" alt="" class="header-bg">
        </div>

        <div class="hero-text">
            <h1>Your</h1>
            <h2>Collection</h2>
        </div>

        <p>A record of the rongōa and plants you connected with in the Biome garden.</p>
    </header>

    <div class="container">

        <!-- Your Collection Section -->
        <section class="collection">
            <div class="cards">
                <div class="card">
                    <a href="kumarahou.html">
                        <div class="card-inner">
                            <img src="images/kumarahou.png" alt="Kūmarahou Soap">
                            <div class="card-text">
                                <h4>Kūmarahou Soap</h4>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="card">
                    <a href="manuka.html">
                        <div class="card-inner">
                            <img src="images/manuka.png" alt="Manuka Tea">
                            <div class="card-text">
                                <h4>Manuka Tea</h4>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="card">
                    <a href="koromiko.html">
                        <div class="card-inner">
                            <img src="images/koromiko.png" alt="Koromiko Tea">
                            <div class="card-text">
                                <h4>Koromiko Tea</h4>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <!-- Explore Plants Button -->
        <a href="scan.html" class="explore-button">Scan Plants Nearby</a>

        <script src="script.js"></script>
    </div>
</body>

</html>
