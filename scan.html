<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.iconify.design/3/3.2.1/iconify.min.js"></script>
    <link rel="stylesheet" href="https://use.typekit.net/lhk3lyb.css">
    <link rel="stylesheet" href="style.css">
    <title>Biome</title>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
            <div class="logo">
                <img src="images/biome-logo.png" alt="Biome Logo">
            </div>
            <div class="account-icon">
                <a href="account.html">
                    <img src="images/account.svg" alt="Account Icon">
                </a>
            </div>
        </div>

        <div class="hero-text">
            <h1>Keep</h1>
            <h2>Exploring</h2>
        </div>

        <p>You have only just begun. There are more plants around you with stories, benefits, and remedies to discover.
        </p>

        <p>Use your camera to scan a plant nearby and see what you can find. </p>
        </p>
    </header>

    <div class="camera-container">
    <video id="camera" autoplay playsinline></video>
    <button id="capture-btn">Scan Plant</button>
</div>
